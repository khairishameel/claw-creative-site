<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experimental Test — Three.js Diagnostic</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #0d1117;
      color: #10b981;
      font-family: 'JetBrains Mono', Consolas, monospace;
      overflow: hidden;
    }
    #status {
      position: fixed; top: 16px; left: 16px; z-index: 10;
      font-size: 13px; line-height: 1.7;
      background: rgba(0,0,0,0.55);
      padding: 14px 18px;
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 8px;
      max-width: 90vw;
    }
    #status div { white-space: pre; }
    #status .ok  { color: #10b981; }
    #status .bad { color: #ef4444; }
    #status .info { color: #f5f5f5; }
    canvas#test-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0; left: 0;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div id="status"></div>
  <canvas id="test-canvas"></canvas>

  <!-- Self-logging so any user can see what's happening without DevTools -->
  <script>
    const status = document.getElementById('status');
    function log(msg, kind) {
      const line = document.createElement('div');
      line.className = kind || 'info';
      line.textContent = '> ' + msg;
      status.appendChild(line);
      console.log('[test]', msg);
    }
    function err(msg) { log(msg, 'bad'); }
    function ok(msg)  { log(msg, 'ok'); }

    log('document ready');
    log('canvas element: ' + !!document.getElementById('test-canvas'));
  </script>

  <!-- Primary CDN -->
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
    onload="window.__threeSource = 'cdnjs'"
    onerror="window.__threeCdnFailed = true"></script>

  <script>
    function tryFallbackCDN() {
      return new Promise((resolve) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/[email protected]/build/three.min.js';
        s.onload = () => { window.__threeSource = 'jsdelivr'; resolve(true); };
        s.onerror = () => { resolve(false); };
        document.head.appendChild(s);
      });
    }

    (async () => {
      // Give the primary <script> tag a moment to settle
      await new Promise((r) => setTimeout(r, 150));

      if (typeof THREE === 'undefined') {
        err('PRIMARY CDN (cdnjs.cloudflare.com) did not deliver three.js');
        log('trying fallback (cdn.jsdelivr.net)...');
        const ok2 = await tryFallbackCDN();
        if (!ok2 || typeof THREE === 'undefined') {
          err('FALLBACK CDN also failed');
          err('Both CDNs blocked or unreachable.');
          err('Check: network, VPN, ad-blocker, DNS.');
          return;
        }
      }

      ok('THREE loaded (source: ' + (window.__threeSource || 'unknown') + ')');
      ok('THREE revision: r' + THREE.REVISION);

      try {
        const canvas = document.getElementById('test-canvas');
        log('canvas CSS size: ' + canvas.clientWidth + ' x ' + canvas.clientHeight);

        const scene = new THREE.Scene();
        log('scene created');

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;
        log('camera created · z=5 · aspect=' + (window.innerWidth / window.innerHeight).toFixed(2));

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x0d1117, 1);  // dark navy clear color

        const gl = renderer.getContext();
        if (!gl) { err('WebGL context is NULL — GPU/browser blocked it'); return; }
        ok('renderer created · ctx=' + (gl.getParameter(gl.VERSION) || 'unknown'));
        log('canvas backing: ' + canvas.width + ' x ' + canvas.height);

        const geometry = new THREE.TorusKnotGeometry(1, 0.3, 64, 8);
        const material = new THREE.MeshBasicMaterial({ color: 0x10b981, wireframe: true });
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);
        ok('torus knot mesh added to scene');

        let frames = 0;
        function animate() {
          requestAnimationFrame(animate);
          mesh.rotation.x += 0.005;
          mesh.rotation.y += 0.005;
          renderer.render(scene, camera);
          frames++;
        }
        animate();
        ok('animation loop started — you should see an emerald rotating torus knot');
        setTimeout(() => {
          ok('frames rendered so far: ' + frames + '  (should be ~60/sec)');
        }, 1000);

        window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });

        canvas.addEventListener('webglcontextlost', (e) => { e.preventDefault(); err('webglcontextlost fired'); });
        canvas.addEventListener('webglcontextrestored', () => { ok('webglcontextrestored fired'); });

      } catch (exc) {
        err('INIT CRASHED: ' + exc.message);
        console.error(exc);
      }
    })();
  </script>
</body>
</html>
